name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/pnpm-lock.yaml" ]; then
              echo "manager=pnpm" >> $GITHUB_OUTPUT
              echo "command=install --frozen-lockfile --prefer-offline" >> $GITHUB_OUTPUT
              echo "runner=pnpm" >> $GITHUB_OUTPUT
              echo "lockfile=pnpm-lock.yaml" >> $GITHUB_OUTPUT
              exit 0
          elif [ -f "${{ github.workspace }}/yarn.lock" ]; then
              echo "manager=yarn" >> $GITHUB_OUTPUT
              echo "command=install --prefer-offline --no-audit" >> $GITHUB_OUTPUT
              echo "runner=yarn" >> $GITHUB_OUTPUT
              echo "lockfile=yarn.lock" >> $GITHUB_OUTPUT
              exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
              echo "manager=npm" >> $GITHUB_OUTPUT
              echo "command=ci --prefer-offline --no-audit --no-fund" >> $GITHUB_OUTPUT
              echo "runner=npx --no-install" >> $GITHUB_OUTPUT
              echo "lockfile=package-lock.json" >> $GITHUB_OUTPUT
              exit 0
          else
              echo "Unable to determine package manager"
              exit 1
          fi

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        if: ${{ steps.detect-package-manager.outputs.manager == 'pnpm' }}
        with:
          version: latest
      
      - uses: actions/setup-node@v7
        name: Setup Node.js
        with:
          node-version: latest
          cache: ${{ steps.detect-package-manager.outputs.manager }}
          cache-dependency-path: ${{ steps.detect-package-manager.outputs.lockfile }}

      - name: Restore cache
        uses: actions/cache@v6
        with:
          path: |
            .next/cache
          # Generate a new cache whenever dependency manifests or source files change.
          # The manager is part of the key so pnpm/yarn/npm caches stay isolated.
          key: ${{ runner.os }}-nextjs-${{ steps.detect-package-manager.outputs.manager }}-${{ hashFiles('package.json', 'next.config.mjs', steps.detect-package-manager.outputs.lockfile) }}-${{ hashFiles('src/**/*') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ steps.detect-package-manager.outputs.manager }}-

      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}

      - name: Build website
        run: ${{ steps.detect-package-manager.outputs.runner }} run build
        env:
          BASE_PATH: 
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
